<!DOCTYPE html>

<head>

<title>对话记录</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #333; padding: 40px 20px; }
  h1 { text-align: center; font-size: 22px; margin-bottom: 32px; }
  .tabs { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 24px; }
  .tab {
    padding: 8px 18px; border-radius: 20px; font-size: 13px;
    cursor: pointer; border: 1px solid #ddd; background: #fff; color: #555;
    transition: all .2s;
  }
  .tab:hover { border-color: #4f8ef7; color: #4f8ef7; }
  .tab.active { background: #4f8ef7; color: #fff; border-color: #4f8ef7; }
  #chat-list { max-width: 800px; margin: 0 auto; }
  .session { margin-bottom: 28px; }
  .session-header {
    font-size: 14px; font-weight: 600; color: #666;
    border-bottom: 1px solid #e5e7eb; padding-bottom: 8px; margin-bottom: 12px;
  }
  .chat-item {
    background: #fff; border-radius: 12px; padding: 14px 18px;
    margin-bottom: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.06);
  }
  .chat-item .meta { font-size: 11px; color: #999; margin-bottom: 6px; }
  .chat-item .content { font-size: 14px; line-height: 1.6; white-space: pre-wrap; }
  .chat-item .role { font-weight: 600; margin-right: 8px; }
  .role-user { color: #4f8ef7; }
  .role-ai { color: #22c55e; }
  .empty { text-align: center; color: #999; padding: 60px 0; font-size: 15px; }
  .download-bar {
    display: flex; gap: 10px; justify-content: center; align-items: center; margin-bottom: 24px;
  }
  .download-bar select {
    padding: 8px 14px; border-radius: 8px; border: 1px solid #ddd;
    font-size: 13px; background: #fff;
  }
  .btn-dl {
    padding: 8px 20px; background: #22c55e; color: #fff; border: none;
    border-radius: 8px; font-size: 13px; cursor: pointer;
  }
  .btn-dl:hover { background: #16a34a; }
</style>
</head>

<div class="download-bar" id="download-bar">
  <select id="date-select"><option value="">选择日期</option></select>
  <button class="btn-dl" onclick="downloadLog()">下载当天记录</button>
</div>
<div id="chat-list"></div>

let currentTab = '全部';

function getAllMessages() {
  let all = [];
  Object.entries(chatData).forEach(([key, msgs]) => {
    if (key !== '全部' && msgs) {
      msgs.forEach(m => all.push({...m, project: key}));
    }
  });
  all.sort((a, b) => new Date(a.time) - new Date(b.time));
  return all;
}

function renderTabs() {
  const tabs = document.getElementById('tabs');
  tabs.innerHTML = Object.keys(chatData).map(name =>
    `<div class="tab ${name === currentTab ? 'active' : ''}" onclick="switchTab('${name}')">${name}</div>`
  ).join('');
}

function switchTab(name) {
  currentTab = name;
  renderTabs();
  renderMessages();
  updateDateSelect();
}
window.switchTab = switchTab;

function renderMessages() {
  const list = document.getElementById('chat-list');
  const msgs = currentTab === '全部' ? getAllMessages() : chatData[currentTab];
  if (!msgs || !msgs.length) {
    list.innerHTML = '<div class="empty">暂无对话记录</div>';
    return;
  }
  const groups = {};
  msgs.forEach(r => {
    const d = new Date(r.time);
    const dateKey = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (!groups[dateKey]) groups[dateKey] = [];
    groups[dateKey].push(r);
  });
  list.innerHTML = Object.entries(groups).map(([date, items]) => {
    const html = items.map(r => {
      const d = new Date(r.time);
      const timeStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      const roleClass = r.role === 'user' ? 'role-user' : 'role-ai';
      const roleName = r.role === 'user' ? '用户' : 'AI';
      const tag = r.project && currentTab === '全部' ? ` [${r.project}]` : '';
      return `<div class="chat-item">
        <div class="meta">${timeStr}${tag}</div>
        <div class="content"><span class="role ${roleClass}">${roleName}:</span>${escapeHtml(r.content)}</div>
      </div>`;
    }).join('');
    return `<div class="session"><div class="session-header">${date}</div>${html}</div>`;
  }).join('');
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

renderTabs();
renderMessages();
updateDateSelect();

function updateDateSelect() {
  const select = document.getElementById('date-select');
  const msgs = currentTab === '全部' ? getAllMessages() : chatData[currentTab];
  const dates = new Set();
  if (msgs) {
    msgs.forEach(r => {
      const d = new Date(r.time);
      dates.add(`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`);
    });
  }
  const sorted = [...dates].sort().reverse();
  select.innerHTML = '<option value="">选择日期</option>' + sorted.map(d => `<option value="${d}">${d}</option>`).join('');
}

function downloadLog() {
  const select = document.getElementById('date-select');
  const date = select.value;
  if (!date) { alert('请先选择日期'); return; }
  const msgs = currentTab === '全部' ? getAllMessages() : chatData[currentTab];
  const filtered = msgs.filter(r => {
    const d = new Date(r.time);
    const dk = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    return dk === date;
  });
  if (!filtered.length) { alert('该日期没有记录'); return; }
  const projectName = currentTab === '全部' ? '全部项目' : currentTab;
  let text = `对话记录 - ${projectName} - ${date}\n${'='.repeat(40)}\n\n`;
  filtered.forEach(r => {
    const d = new Date(r.time);
    const timeStr = `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    const roleName = r.role === 'user' ? '用户' : 'AI';
    text += `[${timeStr}] ${roleName}:\n${r.content}\n\n`;
  });
  const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `${projectName}-${date}.txt`;
  a.click();
}
window.downloadLog = downloadLog;
</script>
</body>
</html>
