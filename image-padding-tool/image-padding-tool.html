<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>图片加边距工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  body { font-family: sans-serif; max-width: 680px; margin: 40px auto; padding: 0 20px; }
  .controls { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; margin: 16px 0; }
  input[type=number] { width: 80px; padding: 6px; border: 1px solid #ccc; border-radius: 4px; }
  button { padding: 8px 18px; background: #2563eb; color: #fff; border: none; border-radius: 4px; cursor: pointer; }
  button:disabled { background: #93c5fd; cursor: default; }
  #dropzone {
    border: 2px dashed #aaa; border-radius: 8px; padding: 40px;
    text-align: center; color: #888; cursor: pointer;
  }
  #dropzone.over { border-color: #2563eb; color: #2563eb; }
  #preview { display: flex; flex-wrap: wrap; gap: 8px; margin: 12px 0; }
  .thumb img { width: 72px; height: 72px; object-fit: contain; border: 1px solid #ddd; border-radius: 4px; background: repeating-conic-gradient(#eee 0% 25%, #fff 0% 50%) 50%/12px 12px; }
  #status { font-size: 13px; color: #555; }
</style>
</head>
<body>
<h2>图片加边距工具</h2>
<p style="font-size:13px;color:#666">原图内容不缩放，四周填充透明区域至目标尺寸，居中放置，导出为 PNG 压缩包。</p>

<div id="dropzone">拖拽图片到此处，或点击选择</div>
<input type="file" id="fileInput" accept="image/*" multiple style="display:none">

<div class="controls">
  <label>目标宽 <input type="number" id="outW" min="1" placeholder="px"></label>
  <label>目标高 <input type="number" id="outH" min="1" placeholder="px"></label>
  <button id="btn" disabled>处理并下载压缩包</button>
</div>

<div id="status"></div>
<div id="preview"></div>
<canvas id="c" style="display:none"></canvas>

<script>
const dz = document.getElementById('dropzone');
const fi = document.getElementById('fileInput');
const btn = document.getElementById('btn');
const statusEl = document.getElementById('status');
const preview = document.getElementById('preview');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let files = [];

dz.onclick = () => fi.click();
dz.ondragover = e => { e.preventDefault(); dz.classList.add('over'); };
dz.ondragleave = () => dz.classList.remove('over');
dz.ondrop = e => { e.preventDefault(); dz.classList.remove('over'); add([...e.dataTransfer.files]); };
fi.onchange = () => { add([...fi.files]); fi.value = ''; };

function add(newFiles) {
  files = [...files, ...newFiles.filter(f => f.type.startsWith('image/'))];
  preview.innerHTML = files.map(f =>
    `<div class="thumb"><img src="${URL.createObjectURL(f)}" title="${f.name}"></div>`
  ).join('');
  btn.disabled = !files.length;
  statusEl.textContent = `已加载 ${files.length} 张图片`;
}

btn.onclick = async () => {
  const W = +document.getElementById('outW').value;
  const H = +document.getElementById('outH').value;
  if (!W || !H) return alert('请填写目标尺寸');
  btn.disabled = true;

  const zip = new JSZip();

  for (let i = 0; i < files.length; i++) {
    statusEl.textContent = `处理中 ${i + 1} / ${files.length} ...`;
    const blob = await processFile(files[i], W, H);
    const name = files[i].name.replace(/\.[^.]+$/, '') + '.png';
    zip.file(name, blob);
  }

  statusEl.textContent = '正在生成压缩包...';
  const zipBlob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(zipBlob);
  a.download = 'padded_images.zip';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);

  statusEl.textContent = `完成，共处理 ${files.length} 张`;
  btn.disabled = false;
};

function processFile(file, W, H) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      canvas.width = W;
      canvas.height = H;
      ctx.clearRect(0, 0, W, H);
      ctx.drawImage(img, Math.round((W - img.width) / 2), Math.round((H - img.height) / 2));
      canvas.toBlob(blob => resolve(blob), 'image/png');
    };
    img.src = URL.createObjectURL(file);
  });
}
</script>
</body>
</html>
