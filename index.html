<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>临时工具箱</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: sans-serif; background: #f5f5f7; min-height: 100vh; padding: 48px 24px; }
  h1 { text-align: center; font-size: 28px; color: #1d1d1f; margin-bottom: 40px; }
  .grid { display: flex; flex-wrap: wrap; gap: 24px; justify-content: center; }
  .card {
    background: #fff; border-radius: 16px; width: 200px;
    box-shadow: 0 2px 12px rgba(0,0,0,.08); overflow: hidden;
    display: flex; flex-direction: column; align-items: center; padding-bottom: 20px;
  }
  .card img {
    width: 100%; height: 140px; object-fit: cover;
    border-radius: 12px 12px 0 0; display: block;
  }
  .card-body { padding: 14px 16px 0; text-align: center; width: 100%; }
  .card-body h3 { font-size: 15px; color: #1d1d1f; margin-bottom: 12px; }
  .card-body a {
    display: inline-block; padding: 7px 24px;
    background: #2563eb; color: #fff; border-radius: 8px;
    text-decoration: none; font-size: 13px;
  }
  .card-body a:hover { background: #1d4ed8; }
</style>
</head>
<body>
<h1>临时工具箱</h1>
<div class="grid">

  <div class="card">
    <img src="image-padding-tool/preview.png" onerror="this.style.background='#e5e7eb';this.removeAttribute('src')" alt="">
    <div class="card-body">
      <h3>图片加边距工具</h3>
      <a href="image-padding-tool/image-padding-tool.html">使用</a>
    </div>
  </div>

  <div class="card">
    <img src="XcodeVersionTool/preview.png" onerror="this.style.background='#e5e7eb';this.removeAttribute('src')" alt="">
    <div class="card-body">
      <h3>Xcode 版本工具</h3>
      <a href="XcodeVersionTool/index.html">使用</a>
    </div>
  </div>

</div>
</body>
</html>
