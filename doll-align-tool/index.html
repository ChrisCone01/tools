<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>娃娃对齐工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: sans-serif; background: #1a1a1a; color: #eee; min-height: 100vh; }

.header { padding: 16px 24px; background: #222; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.header h2 { font-size: 18px; white-space: nowrap; }
.header button { padding: 6px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
#uploadBtn { background: #2563eb; color: #fff; }
#downloadBtn { background: #16a34a; color: #fff; }
#downloadBtn:disabled { background: #555; cursor: default; }
.header .info { font-size: 13px; color: #999; }

.main { display: flex; height: calc(100vh - 56px); }

/* 左侧缩略图列表 */
.sidebar { width: 160px; background: #222; overflow-y: auto; border-right: 1px solid #333; flex-shrink: 0; }
.thumb { padding: 6px; cursor: pointer; border-bottom: 1px solid #2a2a2a; position: relative; }
.thumb.active { background: #333; }
.thumb.done::after { content: ''; position: absolute; top: 4px; right: 4px; width: 10px; height: 10px; background: #16a34a; border-radius: 50%; }
.thumb img { width: 100%; aspect-ratio: 2/3; object-fit: contain; background: repeating-conic-gradient(#333 0% 25%, #2a2a2a 0% 50%) 50%/14px 14px; border-radius: 4px; }
.thumb span { display: block; font-size: 10px; color: #888; text-align: center; margin-top: 3px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

/* 右侧编辑区 */
.editor { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 16px; }
.canvas-wrap { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; width: 100%; }
.canvas-wrap canvas { max-width: 100%; max-height: 100%; background: repeating-conic-gradient(#333 0% 25%, #2a2a2a 0% 50%) 50%/20px 20px; border-radius: 8px; }
/* 辅助线 */
.guide-v { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(255,0,0,0.3); pointer-events: none; left: 50%; }
.guide-h { position: absolute; left: 0; right: 0; height: 1px; background: rgba(255,0,0,0.3); pointer-events: none; }

.controls { padding: 12px; display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
.controls label { font-size: 13px; color: #aaa; }
.controls input[type=range] { width: 240px; }
.controls input[type=number] { width: 60px; padding: 4px; background: #333; border: 1px solid #555; color: #eee; border-radius: 4px; text-align: center; }
.controls button { padding: 6px 14px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
#resetBtn { background: #555; color: #eee; }
#confirmBtn { background: #2563eb; color: #fff; }
#autoBtn { background: #9333ea; color: #fff; }

input[type=file] { display: none; }
</style>
</head>
<body>

<div class="header">
  <h2>娃娃对齐工具</h2>
  <button id="uploadBtn">上传图片</button>
  <span class="info" id="statusText">请上传抠好的娃娃图片</span>
  <button id="downloadBtn" disabled>下载压缩包</button>
</div>
<input type="file" id="fileInput" accept="image/*" multiple>

<div class="main">
  <div class="sidebar" id="sidebar"></div>
  <div class="editor">
    <div class="canvas-wrap">
      <div class="guide-v"></div>
      <canvas id="canvas"></canvas>
    </div>
    <div class="controls">
      <label>旋转 <input type="range" id="rotateSlider" min="-45" max="45" step="0.5" value="0">
        <input type="number" id="rotateNum" min="-45" max="45" step="0.5" value="0">°</label>
      <button id="autoBtn">自动检测</button>
      <button id="resetBtn">重置</button>
      <button id="confirmBtn">确认并下一张</button>
    </div>
  </div>
</div>

<script>
const fileInput = document.getElementById('fileInput');
const sidebar = document.getElementById('sidebar');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const rotateSlider = document.getElementById('rotateSlider');
const rotateNum = document.getElementById('rotateNum');
const statusText = document.getElementById('statusText');
const downloadBtn = document.getElementById('downloadBtn');

let images = []; // {file, img, angle, confirmed}
let currentIdx = -1;

document.getElementById('uploadBtn').onclick = () => fileInput.click();
fileInput.onchange = () => { addFiles([...fileInput.files]); fileInput.value = ''; };

function addFiles(files) {
  const newFiles = files.filter(f => f.type.startsWith('image/'));
  let loaded = 0;
  newFiles.forEach(f => {
    const img = new Image();
    const url = URL.createObjectURL(f);
    img.onload = () => {
      images.push({ file: f, img, angle: 0, confirmed: false });
      loaded++;
      if (loaded === newFiles.length) {
        renderSidebar();
        if (currentIdx < 0) selectImage(0);
        statusText.textContent = `共 ${images.length} 张图片`;
      }
    };
    img.src = url;
  });
}

function renderSidebar() {
  sidebar.innerHTML = images.map((item, i) =>
    `<div class="thumb ${i === currentIdx ? 'active' : ''} ${item.confirmed ? 'done' : ''}" onclick="selectImage(${i})">
      <img src="${item.img.src}">
      <span>${item.file.name}</span>
    </div>`
  ).join('');
}

function selectImage(idx) {
  currentIdx = idx;
  rotateSlider.value = images[idx].angle;
  rotateNum.value = images[idx].angle;
  renderSidebar();
  drawCanvas();
}

// 获取脚底中心点（用于旋转轴心）
function getFootCenter(img) {
  const tc = document.createElement('canvas');
  tc.width = img.width; tc.height = img.height;
  const tctx = tc.getContext('2d');
  tctx.drawImage(img, 0, 0);
  const data = tctx.getImageData(0, 0, tc.width, tc.height).data;

  let maxY = 0;
  for (let y = 0; y < tc.height; y++) {
    for (let x = 0; x < tc.width; x++) {
      if (data[(y * tc.width + x) * 4 + 3] > 10 && y > maxY) maxY = y;
    }
  }
  // 脚底区域：最下方5%的像素
  const h = tc.height;
  const botThresh = maxY - maxY * 0.05;
  let sumX = 0, count = 0;
  for (let y = Math.floor(botThresh); y <= maxY; y++) {
    for (let x = 0; x < tc.width; x++) {
      if (data[(y * tc.width + x) * 4 + 3] > 10) { sumX += x; count++; }
    }
  }
  return { x: count > 0 ? sumX / count : tc.width / 2, y: maxY };
}

function drawCanvas() {
  if (currentIdx < 0) return;
  const item = images[currentIdx];
  const img = item.img;
  const angle = item.angle * Math.PI / 180;
  const foot = getFootCenter(img);

  canvas.width = img.width;
  canvas.height = img.height;

  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  // 以脚底中心为旋转轴
  ctx.translate(foot.x, foot.y);
  ctx.rotate(angle);
  ctx.translate(-foot.x, -foot.y);
  ctx.drawImage(img, 0, 0);
  ctx.restore();
}

rotateSlider.oninput = () => {
  if (currentIdx < 0) return;
  const val = parseFloat(rotateSlider.value);
  rotateNum.value = val;
  images[currentIdx].angle = val;
  drawCanvas();
};
rotateNum.oninput = () => {
  if (currentIdx < 0) return;
  let val = parseFloat(rotateNum.value) || 0;
  val = Math.max(-45, Math.min(45, val));
  rotateSlider.value = val;
  images[currentIdx].angle = val;
  drawCanvas();
};

document.getElementById('resetBtn').onclick = () => {
  if (currentIdx < 0) return;
  images[currentIdx].angle = 0;
  rotateSlider.value = 0;
  rotateNum.value = 0;
  drawCanvas();
};

// 自动检测倾斜角（以脚底为基准）
document.getElementById('autoBtn').onclick = () => {
  if (currentIdx < 0) return;
  const item = images[currentIdx];
  const img = item.img;

  const tc = document.createElement('canvas');
  tc.width = img.width; tc.height = img.height;
  const tctx = tc.getContext('2d');
  tctx.drawImage(img, 0, 0);
  const data = tctx.getImageData(0, 0, tc.width, tc.height).data;
  const W = tc.width, H = tc.height;

  // 找整体上下边界
  let minY = H, maxY = 0;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      if (data[(y * W + x) * 4 + 3] > 10) {
        if (y < minY) minY = y;
        if (y > maxY) maxY = y;
      }
    }
  }
  if (maxY <= minY) return;

  const objH = maxY - minY;
  // 脚底区域：最下方5%的像素中心
  const botThresh = maxY - objH * 0.05;
  let botSumX = 0, botCount = 0;
  for (let y = Math.floor(botThresh); y <= maxY; y++) {
    for (let x = 0; x < W; x++) {
      if (data[(y * W + x) * 4 + 3] > 10) { botSumX += x; botCount++; }
    }
  }
  // 头顶最高点的 x 坐标
  let topY = minY;
  let topMinX = W, topMaxX = 0;
  for (let x = 0; x < W; x++) {
    if (data[(topY * W + x) * 4 + 3] > 10) {
      if (x < topMinX) topMinX = x;
      if (x > topMaxX) topMaxX = x;
    }
  }
  // 向下扩展几行确保取到头顶区域
  for (let y = minY; y < minY + Math.max(3, objH * 0.02); y++) {
    for (let x = 0; x < W; x++) {
      if (data[(y * W + x) * 4 + 3] > 10) {
        if (x < topMinX) topMinX = x;
        if (x > topMaxX) topMaxX = x;
      }
    }
  }

  if (botCount === 0) return;
  const botCx = botSumX / botCount;
  const topCx = (topMinX + topMaxX) / 2;

  // 从脚底中心到头顶中心的连线，偏离垂直线的角度
  const angle = Math.atan2(topCx - botCx, maxY - minY) * 180 / Math.PI;
  const rounded = Math.round(angle * 2) / 2;

  images[currentIdx].angle = -rounded;
  rotateSlider.value = -rounded;
  rotateNum.value = -rounded;
  drawCanvas();
  statusText.textContent = `自动检测: 偏移${angle.toFixed(1)}°, 已矫正 ${-rounded}°`;
};

// 确认并下一张
document.getElementById('confirmBtn').onclick = () => {
  if (currentIdx < 0) return;
  images[currentIdx].confirmed = true;
  const next = images.findIndex((item, i) => i > currentIdx && !item.confirmed);
  if (next >= 0) {
    selectImage(next);
  } else {
    renderSidebar();
    const allDone = images.every(i => i.confirmed);
    statusText.textContent = allDone
      ? `全部完成！点击下载压缩包`
      : `当前图片已确认，还有 ${images.filter(i => !i.confirmed).length} 张未确认`;
    downloadBtn.disabled = false;
  }
};

// 下载压缩包：旋转 + 脚底对齐 + 水平居中
downloadBtn.onclick = async () => {
  downloadBtn.disabled = true;
  statusText.textContent = '正在处理对齐和打包...';

  const zip = new JSZip();
  const tc = document.createElement('canvas');
  const tctx = tc.getContext('2d');

  // 第一遍：旋转后获取每张图的边界框（以脚底为轴心旋转）
  const processed = [];
  for (const item of images) {
    const img = item.img;
    const W = img.width, H = img.height;
    const foot = getFootCenter(img);

    tc.width = W; tc.height = H;
    tctx.clearRect(0, 0, W, H);
    tctx.save();
    tctx.translate(foot.x, foot.y);
    tctx.rotate(item.angle * Math.PI / 180);
    tctx.translate(-foot.x, -foot.y);
    tctx.drawImage(img, 0, 0);
    tctx.restore();

    const data = tctx.getImageData(0, 0, W, H).data;
    let minY = H, maxY = 0, minX = W, maxX = 0;
    for (let y = 0; y < H; y++) {
      for (let x = 0; x < W; x++) {
        if (data[(y * W + x) * 4 + 3] > 10) {
          if (y < minY) minY = y;
          if (y > maxY) maxY = y;
          if (x < minX) minX = x;
          if (x > maxX) maxX = x;
        }
      }
    }
    processed.push({ item, foot, foot_after: maxY, cx: (minX + maxX) / 2, W, H });
  }

  // 统一对齐基准
  const maxFoot = Math.max(...processed.map(p => p.foot_after));
  const outW = processed[0].W;
  const outH = processed[0].H;

  // 第二遍：绘制对齐后的图（以脚底为轴心旋转 + 平移对齐）
  for (const p of processed) {
    const item = p.item;
    const dy = maxFoot - p.foot_after;
    const dx = Math.round(outW / 2 - p.cx);

    tc.width = outW; tc.height = outH;
    tctx.clearRect(0, 0, outW, outH);
    tctx.save();
    tctx.translate(dx, dy);
    tctx.translate(p.foot.x, p.foot.y);
    tctx.rotate(item.angle * Math.PI / 180);
    tctx.translate(-p.foot.x, -p.foot.y);
    tctx.drawImage(item.img, 0, 0);
    tctx.restore();

    const blob = await new Promise(r => tc.toBlob(r, 'image/png'));
    const name = item.file.name.replace(/\.[^.]+$/, '') + '.png';
    zip.file(name, blob);
  }

  const zipBlob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(zipBlob);
  a.download = 'aligned_dolls.zip';
  a.click();

  statusText.textContent = '下载完成！';
  downloadBtn.disabled = false;
};

// 键盘快捷键
document.addEventListener('keydown', e => {
  if (currentIdx < 0) return;
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') {
    images[currentIdx].angle = Math.max(-45, images[currentIdx].angle - 0.5);
    rotateSlider.value = images[currentIdx].angle;
    rotateNum.value = images[currentIdx].angle;
    drawCanvas();
  } else if (e.key === 'ArrowRight') {
    images[currentIdx].angle = Math.min(45, images[currentIdx].angle + 0.5);
    rotateSlider.value = images[currentIdx].angle;
    rotateNum.value = images[currentIdx].angle;
    drawCanvas();
  } else if (e.key === 'Enter') {
    document.getElementById('confirmBtn').click();
  }
});
</script>
</body>
</html>
