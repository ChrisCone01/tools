<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>娃娃对齐工具</title>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fff; color: #333; }

.container { max-width: 1400px; margin: 0 auto; padding: 40px 24px; }
h1 { font-size: 28px; font-weight: 600; margin-bottom: 32px; text-align: center; }

.upload-area { border: 2px dashed #d0d0d0; border-radius: 12px; padding: 48px; text-align: center; background: #fafafa; cursor: pointer; margin-bottom: 24px; transition: all 0.2s; }
.upload-area:hover { border-color: #2563eb; background: #f0f4ff; }
.upload-area.drag-over { border-color: #2563eb; background: #e0ebff; }
.upload-text { font-size: 16px; color: #666; margin-bottom: 8px; }
.upload-hint { font-size: 13px; color: #999; }

.actions { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; }
.actions button { padding: 10px 24px; border: none; border-radius: 8px; font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s; }
.actions button:disabled { opacity: 0.4; cursor: not-allowed; }
#autoBtn { background: #2563eb; color: #fff; }
#autoBtn:hover:not(:disabled) { background: #1d4ed8; }
#downloadBtn { background: #16a34a; color: #fff; }
#downloadBtn:hover:not(:disabled) { background: #15803d; }
.progress { flex: 1; font-size: 14px; color: #666; }

.main { display: flex; gap: 24px; }
.gallery { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 16px; }
.thumb { border: 2px solid #e5e5e5; border-radius: 8px; padding: 8px; cursor: pointer; transition: all 0.2s; background: #fafafa; }
.thumb:hover { border-color: #2563eb; }
.thumb.active { border-color: #2563eb; background: #f0f4ff; }
.thumb img { width: 100%; aspect-ratio: 2/3; object-fit: contain; border-radius: 4px; }
.thumb-name { font-size: 11px; color: #666; text-align: center; margin-top: 6px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

.editor { width: 400px; flex-shrink: 0; border: 1px solid #e5e5e5; border-radius: 12px; padding: 20px; background: #fafafa; }
.editor.hidden { display: none; }
.preview { width: 100%; aspect-ratio: 2/3; background: repeating-conic-gradient(#f0f0f0 0% 25%, #fafafa 0% 50%) 50%/16px 16px; border-radius: 8px; margin-bottom: 16px; display: flex; align-items: center; justify-content: center; position: relative; }
.preview canvas { max-width: 100%; max-height: 100%; border-radius: 4px; }
.guide { position: absolute; top: 0; bottom: 0; width: 1px; background: rgba(255,0,0,0.25); left: 50%; }

.controls { display: flex; flex-direction: column; gap: 12px; }
.control-row { display: flex; align-items: center; gap: 8px; }
.control-row label { font-size: 13px; color: #666; min-width: 40px; }
.control-row input[type=range] { flex: 1; }
.control-row input[type=number] { width: 70px; padding: 6px; border: 1px solid #d0d0d0; border-radius: 6px; font-size: 13px; text-align: center; }
.control-row button { padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; cursor: pointer; }
#resetBtn { background: #e5e5e5; color: #333; }
#resetBtn:hover { background: #d0d0d0; }
#applyBtn { background: #2563eb; color: #fff; }
#applyBtn:hover { background: #1d4ed8; }

input[type=file] { display: none; }
</style>
</head>
<body>

<div class="container">
  <h1>娃娃对齐工具</h1>

  <div class="upload-area" id="uploadArea">
    <div class="upload-text">点击或拖拽上传图片</div>
    <div class="upload-hint">支持批量上传 PNG/JPG 格式</div>
  </div>
  <input type="file" id="fileInput" accept="image/*" multiple>

  <div class="actions">
    <button id="autoBtn" disabled>自动检测</button>
    <button id="downloadBtn" disabled>下载全部</button>
    <div class="progress" id="progress"></div>
  </div>

  <div class="main">
    <div class="gallery" id="gallery"></div>
    <div class="editor hidden" id="editor">
      <div class="preview">
        <div class="guide"></div>
        <canvas id="canvas"></canvas>
      </div>
      <div class="controls">
        <div class="control-row">
          <label>旋转</label>
          <input type="range" id="rotateSlider" min="-45" max="45" step="0.5" value="0">
          <input type="number" id="rotateNum" min="-45" max="45" step="0.5" value="0">
          <span style="font-size:12px;color:#999">°</span>
        </div>
        <div class="control-row">
          <button id="resetBtn">重置</button>
          <button id="applyBtn" style="flex:1">应用</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const uploadArea = document.getElementById('uploadArea');
const fileInput = document.getElementById('fileInput');
const autoBtn = document.getElementById('autoBtn');
const downloadBtn = document.getElementById('downloadBtn');
const progress = document.getElementById('progress');
const gallery = document.getElementById('gallery');
const editor = document.getElementById('editor');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const rotateSlider = document.getElementById('rotateSlider');
const rotateNum = document.getElementById('rotateNum');

let images = []; // {file, img, angle}
let currentIdx = -1;

uploadArea.onclick = () => fileInput.click();
uploadArea.ondragover = e => { e.preventDefault(); uploadArea.classList.add('drag-over'); };
uploadArea.ondragleave = () => uploadArea.classList.remove('drag-over');
uploadArea.ondrop = e => { e.preventDefault(); uploadArea.classList.remove('drag-over'); addFiles([...e.dataTransfer.files]); };
fileInput.onchange = () => { addFiles([...fileInput.files]); fileInput.value = ''; };

function addFiles(files) {
  const newFiles = files.filter(f => f.type.startsWith('image/'));
  if (!newFiles.length) return;
  let loaded = 0;
  newFiles.forEach(f => {
    const img = new Image();
    img.onload = () => {
      images.push({ file: f, img, angle: 0 });
      loaded++;
      if (loaded === newFiles.length) {
        renderGallery();
        autoBtn.disabled = false;
        downloadBtn.disabled = false;
        progress.textContent = `已加载 ${images.length} 张图片`;
      }
    };
    img.src = URL.createObjectURL(f);
  });
}

function renderGallery() {
  gallery.innerHTML = images.map((item, i) =>
    `<div class="thumb ${i === currentIdx ? 'active' : ''}" onclick="selectImage(${i})">
      <img src="${item.img.src}">
      <div class="thumb-name">${item.file.name}</div>
    </div>`
  ).join('');
}

function selectImage(idx) {
  currentIdx = idx;
  renderGallery();
  editor.classList.remove('hidden');
  rotateSlider.value = images[idx].angle;
  rotateNum.value = images[idx].angle;
  drawCanvas();
}

function getFootCenter(img) {
  const tc = document.createElement('canvas');
  tc.width = img.width; tc.height = img.height;
  const tctx = tc.getContext('2d');
  tctx.drawImage(img, 0, 0);
  const data = tctx.getImageData(0, 0, tc.width, tc.height).data;
  let maxY = 0, footX = tc.width / 2;
  for (let y = tc.height - 1; y >= 0; y--) {
    for (let x = 0; x < tc.width; x++) {
      if (data[(y * tc.width + x) * 4 + 3] > 10) {
        if (y > maxY) { maxY = y; footX = x; }
      }
    }
    if (maxY > 0) break;
  }
  return { x: footX, y: maxY };
}

function drawCanvas() {
  if (currentIdx < 0) return;
  const item = images[currentIdx];
  const img = item.img;
  const angle = item.angle * Math.PI / 180;
  const foot = getFootCenter(img);
  canvas.width = img.width;
  canvas.height = img.height;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(foot.x, foot.y);
  ctx.rotate(angle);
  ctx.translate(-foot.x, -foot.y);
  ctx.drawImage(img, 0, 0);
  ctx.restore();
}

rotateSlider.oninput = () => {
  if (currentIdx < 0) return;
  const val = parseFloat(rotateSlider.value);
  rotateNum.value = val;
  images[currentIdx].angle = val;
  drawCanvas();
};
rotateNum.oninput = () => {
  if (currentIdx < 0) return;
  let val = parseFloat(rotateNum.value) || 0;
  val = Math.max(-45, Math.min(45, val));
  rotateSlider.value = val;
  images[currentIdx].angle = val;
  drawCanvas();
};

document.getElementById('resetBtn').onclick = () => {
  if (currentIdx < 0) return;
  images[currentIdx].angle = 0;
  rotateSlider.value = 0;
  rotateNum.value = 0;
  drawCanvas();
};

document.getElementById('applyBtn').onclick = () => {
  if (currentIdx < 0) return;
  progress.textContent = `已应用旋转 ${images[currentIdx].angle}°`;
};

// 自动检测单张
function autoDetect(img) {
  const tc = document.createElement('canvas');
  tc.width = img.width; tc.height = img.height;
  const tctx = tc.getContext('2d');
  const W = tc.width, H = tc.height;
  const foot = getFootCenter(img);
  const footCx = foot.x, footCy = foot.y;
  tctx.clearRect(0, 0, W, H);
  tctx.drawImage(img, 0, 0);
  const origData = tctx.getImageData(0, 0, W, H).data;
  let topY = 0;
  outer: for (let y = 0; y < H; y++)
    for (let x = 0; x < W; x++)
      if (origData[(y * W + x) * 4 + 3] > 10) { topY = y; break outer; }
  const bodyStartY = Math.max(0, footCy - Math.floor((footCy - topY) * 0.5));
  function calcDiff(angle) {
    tctx.clearRect(0, 0, W, H);
    tctx.save();
    tctx.translate(footCx, footCy);
    tctx.rotate(angle * Math.PI / 180);
    tctx.translate(-footCx, -footCy);
    tctx.drawImage(img, 0, 0);
    tctx.restore();
    const d = tctx.getImageData(0, 0, W, H).data;
    let left = 0, right = 0;
    for (let y = bodyStartY; y < H; y++)
      for (let x = 0; x < W; x++)
        if (d[(y * W + x) * 4 + 3] > 10) { if (x < footCx) left++; else right++; }
    return Math.abs(left - right);
  }
  let best = 0, bestD = Infinity;
  for (let a = -30; a <= 30; a += 2) { const d = calcDiff(a); if (d < bestD) { bestD = d; best = a; } }
  for (let a = best - 3; a <= best + 3; a += 0.5) { const d = calcDiff(a); if (d < bestD) { bestD = d; best = a; } }
  return Math.round(best * 2) / 2;
}

autoBtn.onclick = () => {
  if (!images.length) return;
  autoBtn.disabled = true;
  let i = 0;
  function next() {
    if (i >= images.length) {
      autoBtn.disabled = false;
      renderGallery();
      if (currentIdx >= 0) drawCanvas();
      progress.textContent = '自动检测完成，请检查并手动微调';
      return;
    }
    images[i].angle = autoDetect(images[i].img);
    i++;
    progress.textContent = `检测中 ${Math.round(i / images.length * 100)}%`;
    setTimeout(next, 0);
  }
  next();
};

downloadBtn.onclick = async () => {
  downloadBtn.disabled = true;
  progress.textContent = '打包中...';
  const zip = new JSZip();
  const tc = document.createElement('canvas');
  const tctx = tc.getContext('2d');

  const processed = [];
  for (const item of images) {
    const img = item.img;
    const W = img.width, H = img.height;
    const foot = getFootCenter(img);
    tc.width = W; tc.height = H;
    tctx.clearRect(0, 0, W, H);
    tctx.save();
    tctx.translate(foot.x, foot.y);
    tctx.rotate(item.angle * Math.PI / 180);
    tctx.translate(-foot.x, -foot.y);
    tctx.drawImage(img, 0, 0);
    tctx.restore();
    const data = tctx.getImageData(0, 0, W, H).data;
    let minY = H, maxY = 0, minX = W, maxX = 0;
    for (let y = 0; y < H; y++)
      for (let x = 0; x < W; x++)
        if (data[(y * W + x) * 4 + 3] > 10) {
          if (y < minY) minY = y; if (y > maxY) maxY = y;
          if (x < minX) minX = x; if (x > maxX) maxX = x;
        }
    processed.push({ item, foot, footAfter: maxY, cx: (minX + maxX) / 2, W, H });
  }

  const maxFoot = Math.max(...processed.map(p => p.footAfter));
  const outW = processed[0].W, outH = processed[0].H;

  for (const p of processed) {
    const dy = maxFoot - p.footAfter;
    const dx = Math.round(outW / 2 - p.cx);
    tc.width = outW; tc.height = outH;
    tctx.clearRect(0, 0, outW, outH);
    tctx.save();
    tctx.translate(dx, dy);
    tctx.translate(p.foot.x, p.foot.y);
    tctx.rotate(p.item.angle * Math.PI / 180);
    tctx.translate(-p.foot.x, -p.foot.y);
    tctx.drawImage(p.item.img, 0, 0);
    tctx.restore();
    const blob = await new Promise(r => tc.toBlob(r, 'image/png'));
    zip.file(p.item.file.name.replace(/\.[^.]+$/, '') + '.png', blob);
  }

  const zipBlob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(zipBlob);
  a.download = 'aligned_dolls.zip';
  a.click();
  progress.textContent = '下载完成！';
  downloadBtn.disabled = false;
};

document.addEventListener('keydown', e => {
  if (currentIdx < 0 || e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft') { images[currentIdx].angle = Math.max(-45, images[currentIdx].angle - 0.5); }
  else if (e.key === 'ArrowRight') { images[currentIdx].angle = Math.min(45, images[currentIdx].angle + 0.5); }
  else return;
  rotateSlider.value = images[currentIdx].angle;
  rotateNum.value = images[currentIdx].angle;
  drawCanvas();
});
</script>
</body>
</html>
