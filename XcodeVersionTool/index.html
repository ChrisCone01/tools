<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xcode 版本查询</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f5f5f7;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    border-radius: 20px;
    box-shadow: 0 4px 32px rgba(0,0,0,0.10);
    padding: 40px 36px;
    width: 100%;
    max-width: 480px;
  }
  .logo { font-size: 48px; text-align: center; margin-bottom: 8px; }
  h1 { font-size: 24px; font-weight: 700; text-align: center; color: #1d1d1f; margin-bottom: 6px; }
  .subtitle { font-size: 14px; color: #86868b; text-align: center; margin-bottom: 32px; }
  label { font-size: 13px; font-weight: 600; color: #1d1d1f; display: block; margin-bottom: 8px; }
  input {
    width: 100%; padding: 12px 16px; border: 1.5px solid #d2d2d7;
    border-radius: 12px; font-size: 16px; outline: none; transition: border 0.2s;
  }
  input:focus { border-color: #0071e3; }
  .hint { font-size: 12px; color: #86868b; margin-top: 6px; }
  .btn {
    width: 100%; margin-top: 24px; padding: 14px;
    background: #0071e3; color: #fff; border: none;
    border-radius: 12px; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
  .btn:hover { background: #0077ed; }
  .result {
    margin-top: 24px; padding: 20px; background: #f5f5f7;
    border-radius: 14px; display: none;
  }
  .result.show { display: block; }
  .result-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .result-row:last-child { margin-bottom: 0; }
  .result-label { font-size: 13px; color: #86868b; }
  .result-value { font-size: 15px; font-weight: 600; color: #1d1d1f; }
  .btn-apple {
    width: 100%; margin-top: 16px; padding: 13px;
    background: #1d1d1f; color: #fff; border: none;
    border-radius: 12px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background 0.2s; text-decoration: none;
    display: block; text-align: center;
  }
  .btn-apple:hover { background: #3d3d3f; }
  .error { margin-top: 16px; padding: 14px 16px; background: #fff2f2; border-radius: 12px; color: #d70015; font-size: 14px; display: none; }
  .error.show { display: block; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🛠️</div>
  <h1>Xcode 版本查询</h1>
  <p class="subtitle">输入 macOS 版本号，查询对应的 Xcode 版本</p>

  <label for="macInput">macOS 版本号</label>
  <input type="text" id="macInput" placeholder="例如：15.3 或 14.2" autocomplete="off">
  <p class="hint">在 Mac 左上角苹果菜单 → 关于本机 中查看</p>

  <button class="btn" onclick="query()">查询</button>

  <div class="error" id="errorBox"></div>

  <div class="result" id="resultBox">
    <div class="result-row">
      <span class="result-label">你的 macOS</span>
      <span class="result-value" id="resMac"></span>
    </div>
    <div class="result-row">
      <span class="result-label">推荐 Xcode</span>
      <span class="result-value" id="resXcode"></span>
    </div>
    <div class="result-row">
      <span class="result-label">搜索后</span>
      <span class="result-value" id="resHint" style="color:#0071e3;"></span>
    </div>
    <a class="btn-apple" id="resLink" href="#" target="_blank">前往苹果下载页面 →</a>
  </div>
</div>

<script>
// macOS 主版本 → { xcode, search }
const MAP = [
  { min: 26,  max: 99,  xcode: 'Xcode 26.4.1',  search: 'Xcode 26.4.1', hint: '选择第 2 个（Xcode 26.4.1）' },
  { min: 15,  max: 25,  xcode: 'Xcode 16.2',    search: 'Xcode 16.2',   hint: '选择第 2 个（Xcode 16.2）' },
  { min: 14,  max: 14,  xcode: 'Xcode 15.4',    search: 'Xcode 15.4',   hint: '选择第 2 个（Xcode 15.4）' },
  { min: 13,  max: 13,  xcode: 'Xcode 14.2',    search: 'Xcode 14.2',   hint: '选择第 2 个（Xcode 14.2）' },
  { min: 12,  max: 12,  xcode: 'Xcode 13.2.1',  search: 'Xcode 13.2',   hint: '选择第 2 个（Xcode 13.2.1）' },
  { min: 11,  max: 11,  xcode: 'Xcode 12.5.1',  search: 'Xcode 12.5',   hint: '选择第 2 个（Xcode 12.5.1）' },
  { min: 0,   max: 10,  xcode: 'Xcode 12 以下', search: 'Xcode',        hint: '请根据系统版本选择合适的版本' },
];

function query() {
  const raw = document.getElementById('macInput').value.trim();
  const errorBox = document.getElementById('errorBox');
  const resultBox = document.getElementById('resultBox');

  errorBox.className = 'error';
  resultBox.className = 'result';

  const major = parseFloat(raw);
  if (!raw || isNaN(major)) {
    errorBox.textContent = '请输入有效的 macOS 版本号，例如 15.3';
    errorBox.className = 'error show';
    return;
  }

  const majorInt = Math.floor(major);
  const entry = MAP.find(e => majorInt >= e.min && majorInt <= e.max);
  if (!entry) {
    errorBox.textContent = '未找到对应版本，请确认版本号是否正确';
    errorBox.className = 'error show';
    return;
  }

  document.getElementById('resMac').textContent = 'macOS ' + raw;
  document.getElementById('resXcode').textContent = entry.xcode;
  document.getElementById('resHint').textContent = entry.hint;
  document.getElementById('resLink').href =
    'https://developer.apple.com/download/all/?q=' + encodeURIComponent(entry.search);
  resultBox.className = 'result show';
}

document.getElementById('macInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') query();
});
</script>
</body>
</html>
